<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Os 5 Papéis que Estão Te Esgotando — Thays Moya</title>

<style>
html{scroll-behavior:smooth}

body{
font-family:Arial;
margin:0;
background:#faf8f3;
color:#1c1a15
}

.hero{
min-height:100vh;
display:grid;
grid-template-columns:1fr 1fr
}

.hero-esq{
background:#264438;
color:white;
padding:60px;
display:flex;
flex-direction:column;
justify-content:center
}

.hero-dir{
padding:60px;
display:flex;
align-items:center
}

.titulo{
font-size:48px;
line-height:1.1
}

.titulo em{
color:#c4785a
}

.subtitulo-hero{
margin-top:20px;
opacity:.8
}

form{
margin-top:20px
}

input{
width:100%;
padding:15px;
margin-bottom:12px;
border:1px solid #ddd;
font-size:14px
}

.btn{
width:100%;
padding:18px;
background:#c4785a;
color:white;
border:none;
font-size:14px;
cursor:pointer
}

.btn:hover{
background:#9e5a3f
}

.cta-final{
text-align:center;
padding:100px 20px
}

.btn-final{
background:#c4785a;
color:white;
padding:18px 40px;
text-decoration:none;
display:inline-block
}

.btn-final:hover{
background:#9e5a3f
}
</style>
</head>

<body>

<section class="hero">

<div class="hero-esq">

<h1 class="titulo">
Os 5 Papéis que
<em>Estão Te Esgotando</em>
</h1>

<p class="subtitulo-hero">
Para a mulher que cuida de todo mundo — e esqueceu como cuidar de si.
</p>

</div>

<div class="hero-dir">

<form id="form" onsubmit="enviar(event)">

<input
type="text"
id="nome"
placeholder="Seu primeiro nome"
required
>

<input
type="tel"
id="fone"
placeholder="WhatsApp com DDD"
required
>

<button class="btn">
Quero meu e-book grátis
</button>

</form>

</div>

</section>

<section class="cta-final">

<h2>
Pronta para <em>nomear o peso?</em>
</h2>

<p>
O e-book chega direto no seu WhatsApp.
</p>

<br>

<a href="#form"
class="btn-final"
onclick="setTimeout(()=>document.getElementById('nome').focus(),300)">

Quero meu e-book grátis

</a>

</section>

<script>

const WHATSAPP_NUMERO="5567935016168"

function enviar(e){

e.preventDefault()

const nome=document.getElementById('nome').value.trim()
const fone=document.getElementById('fone').value.trim()

const msg=encodeURIComponent(
`Olá Thays! Sou ${nome} e quero receber o e-book gratuito "Os 5 Papéis que Estão Te Esgotando". Meu WhatsApp é ${fone}.`
)

window.open(`https://wa.me/${WHATSAPP_NUMERO}?text=${msg}`,'_blank')

}

</script>

</body>
</html>
